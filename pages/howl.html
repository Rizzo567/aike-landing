<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Howl — Aike AI</title>
  <meta name="description" content="Howl è il tuo direttore operativo AI. Analizza, automatizza, gestisce." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --h-sidebar-w:   252px;
      --h-bg:          #0B0B0C;
      --h-sidebar:     #0F0F11;
      --h-surface:     #1C1C1E;
      --h-surface-alt: #242426;
      --h-border:      rgba(255,255,255,0.07);
      --h-border-sub:  rgba(255,255,255,0.04);
      --h-purple:      #a855f7;
      --h-purple-dark: #7c3aed;
      --h-purple-dim:  rgba(168,85,247,0.11);
      --h-text:        #ffffff;
      --h-text-sec:    rgba(235,235,245,0.82);
      --h-text-muted:  rgba(235,235,245,0.48);
      --h-text-dim:    rgba(235,235,245,0.26);
      --h-r-sm:        9px;
      --h-r-md:        14px;
      --h-r-lg:        18px;
      --h-r-full:      999px;
      --h-font:        'Inter', system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--h-font); background: var(--h-bg); color: var(--h-text); -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: var(--h-font); }
    input, textarea, button { border: none; outline: none; background: none; }
    img { display: block; max-width: 100%; }

    /* ── Shell ── */
    .howl-shell { display: flex; height: 100vh; width: 100vw; overflow: hidden; }

    /* ── Sidebar ── */
    .howl-sidebar {
      width: var(--h-sidebar-w);
      flex-shrink: 0;
      background: var(--h-sidebar);
      border-right: 1px solid var(--h-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.28s cubic-bezier(0.32,0,0.67,0);
    }
    .howl-brand {
      display: flex; align-items: center; gap: 9px;
      padding: 22px 16px;
      border-bottom: 1px solid var(--h-border-sub);
      flex-shrink: 0;
    }
    .howl-brand-logo { width: 26px; height: 26px; object-fit: contain; }
    .howl-brand-name { font-size: 0.975rem; font-weight: 700; color: var(--h-text); letter-spacing: -0.025em; }

    .howl-nav {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 12px 8px;
      display: flex; flex-direction: column; gap: 22px;
    }
    .howl-nav::-webkit-scrollbar { width: 3px; }
    .howl-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }

    .howl-nav-group { display: flex; flex-direction: column; gap: 2px; }
    .howl-nav-label {
      font-size: 0.67rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--h-text-dim);
      padding: 0 10px; margin-bottom: 5px;
    }
    .howl-nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 9px 11px; border-radius: var(--h-r-sm);
      font-size: 0.865rem; font-weight: 500; color: var(--h-text-muted);
      background: none; width: 100%; text-align: left;
      transition: background 140ms ease, color 140ms ease;
    }
    .howl-nav-item:hover { background: rgba(255,255,255,0.055); color: var(--h-text-sec); }
    .howl-nav-item.active { background: var(--h-purple-dim); color: var(--h-purple); }
    .howl-nav-item--new {
      color: var(--h-text-sec); font-weight: 600;
      background: var(--h-surface); border: 1px solid var(--h-border);
    }
    .howl-nav-item--new:hover {
      background: rgba(168,85,247,0.10);
      border-color: rgba(168,85,247,0.28);
      color: var(--h-purple);
    }
    .hn-icon { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.55; transition: opacity 140ms ease; }
    .howl-nav-item:hover .hn-icon,
    .howl-nav-item.active .hn-icon,
    .howl-nav-item--new:hover .hn-icon { opacity: 1; }

    /* Chat nav item with history toggle */
    .howl-chat-nav-row {
      display: flex; align-items: center;
      border-radius: var(--h-r-sm);
      transition: background 140ms ease;
    }
    .howl-chat-nav-row:hover { background: rgba(255,255,255,0.035); }
    .howl-chat-nav-row .howl-nav-item {
      flex: 1; border-radius: 0;
      background: none !important;
    }
    .howl-chat-nav-row .howl-nav-item:hover { background: none !important; }
    .howl-history-toggle-btn {
      width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--h-text-dim); margin-right: 4px;
      transition: background 140ms ease, color 140ms ease;
    }
    .howl-history-toggle-btn:hover { background: rgba(255,255,255,0.08); color: var(--h-text-muted); }
    .howl-history-toggle-btn svg { transition: transform 200ms ease; }
    .howl-history-toggle-btn.open svg { transform: rotate(90deg); }

    /* History list */
    .howl-history-list {
      display: none; flex-direction: column; gap: 1px;
      padding: 4px 4px 6px 4px;
      overflow: hidden;
    }
    .howl-history-list.open { display: flex; }
    .howl-history-empty {
      font-size: 0.76rem; color: var(--h-text-dim);
      padding: 8px 10px; text-align: center;
    }
    .howl-history-item {
      display: flex; flex-direction: column; gap: 3px;
      padding: 8px 10px; border-radius: 7px;
      cursor: pointer; background: none;
      border: none; width: 100%; text-align: left;
      transition: background 140ms ease;
      font-family: var(--h-font);
    }
    .howl-history-item:hover { background: rgba(255,255,255,0.055); }
    .howl-history-item.active { background: var(--h-purple-dim); }
    .howl-history-title {
      font-size: 0.8rem; font-weight: 500; color: var(--h-text-sec);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 100%;
    }
    .howl-history-item.active .howl-history-title { color: var(--h-purple); }
    .howl-history-meta {
      display: flex; align-items: center; gap: 6px;
    }
    .howl-history-model-dot {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    }
    .howl-history-date {
      font-size: 0.69rem; color: var(--h-text-dim);
    }

    /* Sidebar footer */
    .howl-sidebar-footer {
      padding: 10px 8px 18px; border-top: 1px solid var(--h-border-sub); flex-shrink: 0;
    }
    .howl-user-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: var(--h-r-sm);
      width: 100%; text-align: left; transition: background 140ms ease;
    }
    .howl-user-btn:hover { background: rgba(255,255,255,0.055); }
    .howl-user-avatar {
      width: 27px; height: 27px; border-radius: 50%;
      background: linear-gradient(135deg, var(--h-purple-dark), var(--h-purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .howl-user-name {
      font-size: 0.82rem; font-weight: 500; color: var(--h-text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }

    /* ── Main ── */
    .howl-main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: var(--h-bg); min-width: 0;
    }

    /* Mobile topbar */
    .howl-topbar {
      display: none; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid var(--h-border); flex-shrink: 0;
    }
    .howl-topbar-brand { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 700; letter-spacing: -0.02em; }
    .howl-topbar-brand img { width: 22px; height: 22px; object-fit: contain; }
    .howl-sidebar-toggle {
      width: 34px; height: 34px; border: 1px solid var(--h-border);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      transition: background 140ms ease; color: var(--h-text-muted);
    }
    .howl-sidebar-toggle:hover { background: rgba(255,255,255,0.06); }

    /* Overlay */
    .howl-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 99;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      animation: howlOverlayIn 0.2s ease;
    }
    .howl-overlay.visible { display: block; }
    @keyframes howlOverlayIn { from { opacity: 0; } to { opacity: 1; } }

    /* Thread */
    .howl-thread {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 0 20px; display: flex; flex-direction: column;
    }
    .howl-thread::-webkit-scrollbar { width: 4px; }
    .howl-thread::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.09); border-radius: 99px; }

    /* Welcome */
    .howl-welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; text-align: center; padding: 40px 20px 20px;
      animation: howlFadeUp 0.45s cubic-bezier(0.16,1,0.3,1);
    }
    .howl-welcome.hidden { display: none; }
    @keyframes howlFadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .howl-welcome-logomark {
      width: 52px; height: 52px; border-radius: 16px;
      background: var(--h-surface); border: 1px solid var(--h-border);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 1px rgba(168,85,247,0.12), 0 8px 32px rgba(0,0,0,0.4);
    }
    .howl-welcome-logomark img { width: 30px; height: 30px; object-fit: contain; }
    .howl-welcome-heading {
      font-size: clamp(1.55rem, 3vw, 2.1rem); font-weight: 700;
      color: var(--h-text); letter-spacing: -0.035em; line-height: 1.2; max-width: 440px;
    }
    .howl-welcome-sub {
      font-size: 0.88rem; color: var(--h-text-muted); line-height: 1.65;
      max-width: 340px; margin-top: -6px;
    }
    .howl-welcome-chips {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; width: 100%; max-width: 540px; margin-top: 6px;
    }
    .howl-welcome-chip {
      background: var(--h-surface); border: 1px solid var(--h-border);
      border-radius: var(--h-r-md); padding: 14px 16px; text-align: left;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }
    .howl-welcome-chip:hover {
      background: var(--h-surface-alt); border-color: rgba(168,85,247,0.28);
      transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    }
    .howl-welcome-chip-label { font-size: 0.84rem; font-weight: 500; color: var(--h-text-sec); line-height: 1.45; }
    .howl-welcome-chip-sub { font-size: 0.76rem; color: var(--h-text-dim); margin-top: 3px; }

    /* Messages */
    .howl-messages {
      display: none; flex-direction: column; gap: 26px;
      padding: 28px 0 16px; max-width: 740px; margin: 0 auto; width: 100%;
    }
    .howl-messages.visible { display: flex; }
    .howl-message { animation: howlFadeUp 0.3s cubic-bezier(0.16,1,0.3,1); }

    .howl-msg-user { display: flex; justify-content: flex-end; }
    .howl-msg-user-bubble {
      background: linear-gradient(135deg, var(--h-purple-dark), var(--h-purple));
      color: #fff; border-radius: var(--h-r-lg) var(--h-r-lg) 4px var(--h-r-lg);
      padding: 12px 18px; max-width: 76%;
      font-size: 0.895rem; line-height: 1.65;
    }
    .howl-msg-assistant { display: flex; align-items: flex-start; gap: 12px; }
    .howl-msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--h-surface); border: 1px solid rgba(168,85,247,0.22);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .howl-msg-avatar img { width: 17px; height: 17px; object-fit: contain; }
    .howl-msg-assistant-bubble {
      background: var(--h-surface); border: 1px solid var(--h-border);
      border-left: 2px solid rgba(168,85,247,0.36);
      border-radius: var(--h-r-lg) var(--h-r-lg) var(--h-r-lg) 4px;
      padding: 14px 18px; max-width: 82%;
      font-size: 0.895rem; color: var(--h-text-sec); line-height: 1.72;
    }
    .howl-msg-assistant-bubble strong { color: var(--h-text); font-weight: 600; }
    .howl-msg-assistant-bubble code {
      background: rgba(255,255,255,0.08); padding: 1px 6px;
      border-radius: 4px; font-size: 0.84em; font-family: monospace;
    }
    .howl-msg-assistant-bubble pre {
      background: rgba(0,0,0,0.35); border: 1px solid var(--h-border);
      border-radius: 8px; padding: 12px 14px; margin: 8px 0;
      overflow-x: auto; font-size: 0.83em; line-height: 1.6;
    }
    .howl-msg-assistant-bubble pre code { background: none; padding: 0; }
    .howl-msg-assistant-bubble ul { padding-left: 18px; margin: 6px 0; }
    .howl-msg-assistant-bubble li { margin-bottom: 4px; }

    /* Error bubble */
    .howl-msg-error {
      display: flex; align-items: flex-start; gap: 10px;
      max-width: 740px; margin: 0 auto; width: 100%;
    }
    .howl-msg-error-bubble {
      background: rgba(255,69,58,0.08); border: 1px solid rgba(255,69,58,0.22);
      border-radius: var(--h-r-md); padding: 12px 16px;
      font-size: 0.855rem; color: #ff6b63; line-height: 1.6;
    }

    /* Typing */
    .howl-typing {
      display: none; align-items: center; gap: 12px;
      max-width: 740px; margin: 0 auto; width: 100%; padding: 0 0 6px;
    }
    .howl-typing.visible { display: flex; }
    .howl-typing-bubble {
      background: var(--h-surface); border: 1px solid var(--h-border);
      border-left: 2px solid rgba(168,85,247,0.36);
      border-radius: var(--h-r-md); padding: 12px 16px;
      display: flex; gap: 5px; align-items: center;
    }
    .howl-typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--h-purple); opacity: 0.3;
      animation: howlDot 1.3s ease-in-out infinite;
    }
    .howl-typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .howl-typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes howlDot {
      0%, 100% { opacity: 0.28; transform: scale(1); }
      50%       { opacity: 1;    transform: scale(1.18); }
    }

    /* ── Input area ── */
    .howl-input-area { padding: 14px 20px 22px; flex-shrink: 0; }
    .howl-input-inner {
      max-width: 740px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 9px;
    }
    .howl-input-shell {
      display: flex; align-items: flex-end;
      background: var(--h-surface); border: 1px solid var(--h-border);
      border-radius: 18px; padding: 12px 12px 12px 18px; gap: 10px;
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    .howl-input-shell:focus-within {
      border-color: rgba(168,85,247,0.38);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.07);
    }
    .howl-textarea {
      flex: 1; resize: none; font-family: var(--h-font);
      font-size: 0.9rem; color: var(--h-text); background: none;
      line-height: 1.6; min-height: 24px; max-height: 200px;
      overflow-y: auto; padding: 2px 0; caret-color: var(--h-purple);
    }
    .howl-textarea::placeholder { color: var(--h-text-dim); }
    .howl-textarea::-webkit-scrollbar { width: 3px; }
    .howl-textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 99px; }

    .howl-send-btn {
      width: 36px; height: 36px; border-radius: 12px;
      background: var(--h-surface-alt); border: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--h-text-dim); transition: all 200ms ease;
    }
    .howl-send-btn.active {
      background: linear-gradient(135deg, var(--h-purple-dark), var(--h-purple));
      border-color: transparent; color: #fff;
      box-shadow: 0 4px 14px rgba(168,85,247,0.32);
    }
    .howl-send-btn.active:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(168,85,247,0.44); }
    .howl-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Input footer row */
    .howl-input-footer {
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px; padding: 0 4px;
    }
    .howl-input-footer-left { display: flex; align-items: center; gap: 8px; min-width: 0; }

    /* Model selector */
    .howl-model-wrap { position: relative; flex-shrink: 0; }
    .howl-model-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: var(--h-r-full);
      border: 1px solid var(--h-border); background: none;
      font-size: 0.77rem; font-weight: 500; color: var(--h-text-muted);
      font-family: var(--h-font);
      transition: border-color 150ms ease, color 150ms ease, background 150ms ease;
      white-space: nowrap;
    }
    .howl-model-pill:hover { border-color: rgba(168,85,247,0.28); color: var(--h-text-sec); background: rgba(168,85,247,0.05); }
    .howl-model-pill.open { border-color: rgba(168,85,247,0.40); color: var(--h-text); background: rgba(168,85,247,0.07); }
    .howl-model-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .howl-model-chevron { opacity: 0.5; transition: transform 180ms ease; }
    .howl-model-pill.open .howl-model-chevron { transform: rotate(180deg); }

    .howl-model-dropdown {
      position: absolute; bottom: calc(100% + 8px); left: 0;
      background: #1a1a1c; border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px; padding: 5px;
      min-width: 190px; z-index: 200;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(168,85,247,0.07);
      opacity: 0; visibility: hidden; transform: translateY(6px);
      transition: opacity 150ms ease, transform 150ms ease, visibility 0s linear 150ms;
    }
    .howl-model-dropdown.open {
      opacity: 1; visibility: visible; transform: translateY(0);
      transition: opacity 150ms ease, transform 150ms ease;
    }
    .howl-model-option {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 11px; border-radius: 8px;
      width: 100%; background: none; border: none;
      font-family: var(--h-font); cursor: pointer;
      transition: background 120ms ease;
    }
    .howl-model-option:hover { background: rgba(255,255,255,0.07); }
    .howl-model-option.selected { background: var(--h-purple-dim); }
    .howl-model-option-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .howl-model-option-info { display: flex; flex-direction: column; gap: 1px; text-align: left; }
    .howl-model-option-name { font-size: 0.83rem; font-weight: 500; color: var(--h-text-sec); }
    .howl-model-option.selected .howl-model-option-name { color: var(--h-text); }
    .howl-model-option-provider { font-size: 0.7rem; color: var(--h-text-dim); }

    /* Input tag pills */
    .howl-input-tags { display: flex; gap: 6px; }
    .howl-input-tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 9px; border-radius: var(--h-r-full);
      border: 1px solid var(--h-border); font-size: 0.74rem;
      font-weight: 500; color: var(--h-text-dim);
      transition: border-color 150ms ease, color 150ms ease, background 150ms ease;
    }
    .howl-input-tag:hover { border-color: rgba(168,85,247,0.22); color: var(--h-text-muted); background: rgba(168,85,247,0.05); }
    .howl-disclaimer { font-size: 0.71rem; color: var(--h-text-dim); white-space: nowrap; flex-shrink: 0; }

    /* ── Responsive ── */
    @media (max-width: 820px) {
      .howl-sidebar {
        position: fixed; top: 0; left: 0; height: 100%; z-index: 100;
        transform: translateX(-100%); box-shadow: 4px 0 40px rgba(0,0,0,0.5);
      }
      .howl-sidebar.open { transform: translateX(0); }
      .howl-topbar { display: flex; }
      .howl-welcome-chips { grid-template-columns: 1fr; max-width: 400px; }
      .howl-disclaimer { display: none; }
    }
    @media (max-width: 480px) {
      .howl-welcome-heading { font-size: 1.4rem; }
      .howl-input-tags { display: none; }
    }
  </style>
</head>
<body>
<div class="howl-shell">

  <!-- ── Sidebar ── -->
  <aside class="howl-sidebar" id="howlSidebar" aria-label="Navigazione Howl">

    <a href="../index.html" class="howl-brand" aria-label="Torna alla home Aike">
      <img src="../assets/images/logo.png" alt="Aike" class="howl-brand-logo" />
      <span class="howl-brand-name">aike</span>
    </a>

    <nav class="howl-nav" aria-label="Howl navigation">

      <!-- Primary actions -->
      <div class="howl-nav-group">
        <button class="howl-nav-item howl-nav-item--new" id="howlNewChat" aria-label="Nuova conversazione">

  </aside>

  <div class="howl-overlay" id="howlOverlay" aria-hidden="true"></div>

  <!-- ── Main ── -->
  <main class="howl-main">

        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <line x1="2" y1="4.5" x2="14" y2="4.5"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="11.5" x2="14" y2="11.5"/>

    <!-- Thread -->
    <div class="howl-thread" id="howlThread" role="log" aria-live="polite">

      <div class="howl-welcome" id="howlWelcome">
        <div class="howl-welcome-logomark">
          <img src="../assets/images/logo.png" alt="Howl" />

        <p class="howl-welcome-sub">Il tuo direttore operativo AI. Analizza dati, progetta automazioni, gestisce operazioni.</p>
        <div class="howl-welcome-chips" role="list">
          <button class="howl-welcome-chip" data-prompt="Analizza i miei dati aziendali e dimmi cosa sta succedendo con le metriche principali">

                Dati
              </button>

                <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5.5L6 9.5a3 3 0 01-4.2-4.2l4-4a2 2 0 012.8 2.8L4.4 8.4a1 1 0 01-1.4-1.4L7 3"/></svg>

          <span class="howl-disclaimer">Howl può fare errori. Verifica le informazioni critiche.</span>

</div>

<script>
(function () {
  'use strict';

  // ─────────────────────────────────────────────────────────────────
  // MODELS
  // ─────────────────────────────────────────────────────────────────
  const MODELS = [
    {
      id:       'claude-sonnet-4-6',
      label:    'Claude Sonnet 4.6',
      provider: 'Anthropic',
      color:    '#d4a843',   // warm amber
    },
    {
      id:       'gemini-2.0-flash',
      label:    'Gemini Flash 2.0',
      provider: 'Google',
      color:    '#4285f4',   // Google blue
    },
    {
      id:       'gpt-4o',
      label:    'GPT-4o',
      provider: 'OpenAI',
      color:    '#10a37f',   // OpenAI green
    },
  ];

  // ─────────────────────────────────────────────────────────────────
  // STORAGE KEYS
  // ─────────────────────────────────────────────────────────────────
  const STORAGE_CONVOS  = 'howl_conversations_v2';
  const STORAGE_CURRENT = 'howl_current_id_v2';
  const MAX_HISTORY     = 40;

  // ─────────────────────────────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────────────────────────────
  let currentModel  = MODELS[0].id;
  let currentConvoId = null;          // active conversation id
  let convoMessages  = [];            // [{role,content}] for current convo
  let isRequesting   = false;
  let historyOpen    = false;

  // ─────────────────────────────────────────────────────────────────
  // ELEMENTS
  // ─────────────────────────────────────────────────────────────────
  const sidebar        = document.getElementById('howlSidebar');
  const overlay        = document.getElementById('howlOverlay');
  const sidebarToggle  = document.getElementById('howlSidebarToggle');
  const newChatBtn     = document.getElementById('howlNewChat');
  const welcome        = document.getElementById('howlWelcome');
  const messagesEl     = document.getElementById('howlMessages');
  const typingEl       = document.getElementById('howlTyping');
  const threadEl       = document.getElementById('howlThread');
  const textarea       = document.getElementById('howlTextarea');
  const sendBtn        = document.getElementById('howlSendBtn');
  const modelPill      = document.getElementById('howlModelPill');
  const modelDot       = document.getElementById('howlModelDot');
  const modelLabel     = document.getElementById('howlModelLabel');
  const modelDropdown  = document.getElementById('howlModelDropdown');
  const historyToggle  = document.getElementById('howlHistoryToggle');
  const historyList    = document.getElementById('howlHistoryList');

  // ─────────────────────────────────────────────────────────────────
  // HISTORY (localStorage)
  // ─────────────────────────────────────────────────────────────────
  function loadConversations() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_CONVOS) || '[]');
    } catch { return []; }
  }

  function saveConversations(convos) {
    // Keep only the most recent MAX_HISTORY
    const trimmed = convos.slice(-MAX_HISTORY);
    localStorage.setItem(STORAGE_CONVOS, JSON.stringify(trimmed));
  }

  function upsertConversation(id, title, model, messages) {
    const convos = loadConversations();
    const idx = convos.findIndex(c => c.id === id);
    const entry = {
      id,
      title: title.slice(0, 60),
      model,
      messages,
      updatedAt: Date.now(),
      createdAt: idx >= 0 ? convos[idx].createdAt : Date.now(),
    };
    if (idx >= 0) convos[idx] = entry;
    else          convos.push(entry);
    saveConversations(convos);
  }

  function deleteConversation(id) {
    const convos = loadConversations().filter(c => c.id !== id);
    saveConversations(convos);
  }

  // ─────────────────────────────────────────────────────────────────
  // HISTORY SIDEBAR RENDERING
  // ─────────────────────────────────────────────────────────────────
  function renderHistory() {
    const convos = loadConversations().slice().reverse(); // newest first

    historyList.innerHTML = '';

    if (convos.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'howl-history-empty';
      empty.textContent = 'Nessuna chat salvata';
      historyList.appendChild(empty);
      return;
    }

    convos.forEach(function (c) {
      const modelInfo = MODELS.find(m => m.id === c.model) || MODELS[0];

      const item = document.createElement('button');
      item.className = 'howl-history-item' + (c.id === currentConvoId ? ' active' : '');
      item.setAttribute('data-id', c.id);
      item.innerHTML =
        '<span class="howl-history-title">' + escapeHTML(c.title) + '</span>' +
        '<span class="howl-history-meta">' +
          '<span class="howl-history-model-dot" style="background:' + modelInfo.color + '"></span>' +
          '<span class="howl-history-date">' + formatDate(c.updatedAt) + '</span>' +
        '</span>';

      item.addEventListener('click', function () {
        loadConversation(c.id);
        if (window.innerWidth <= 820) closeSidebar();
      });

      historyList.appendChild(item);
    });
  }

  function loadConversation(id) {
    const convos = loadConversations();
    const c = convos.find(x => x.id === id);
    if (!c) return;

    // Set state
    currentConvoId = c.id;
    convoMessages  = c.messages.slice();
    currentModel   = c.model;
    updateModelUI();
    localStorage.setItem(STORAGE_CURRENT, id);

    // Render thread
    resetThread(false);
    welcome.classList.add('hidden');
    messagesEl.classList.add('visible');

    c.messages.forEach(function (m) {
      renderMessage(m.role, m.content);
    });

    scrollToBottom();
    renderHistory(); // update active state
    textarea.focus();
  }

  // ─────────────────────────────────────────────────────────────────
  // MODEL SELECTOR
  // ─────────────────────────────────────────────────────────────────
  function buildModelDropdown() {
    modelDropdown.innerHTML = '';
    MODELS.forEach(function (m) {
      const btn = document.createElement('button');
      btn.className = 'howl-model-option' + (m.id === currentModel ? ' selected' : '');
      btn.setAttribute('role', 'option');
      btn.setAttribute('data-model', m.id);
      btn.innerHTML =
        '<span class="howl-model-option-dot" style="background:' + m.color + '"></span>' +
        '<span class="howl-model-option-info">' +
          '<span class="howl-model-option-name">' + m.label + '</span>' +
          '<span class="howl-model-option-provider">' + m.provider + '</span>' +
        '</span>';
      btn.addEventListener('click', function () {
        currentModel = m.id;
        updateModelUI();
        closeModelDropdown();
      });
      modelDropdown.appendChild(btn);
    });
  }

  function updateModelUI() {
    const m = MODELS.find(x => x.id === currentModel) || MODELS[0];
    modelDot.style.background   = m.color;
    modelLabel.textContent      = m.label;
    // Refresh dropdown selection states
    modelDropdown.querySelectorAll('.howl-model-option').forEach(function (btn) {
      btn.classList.toggle('selected', btn.getAttribute('data-model') === currentModel);
    });
  }

  function openModelDropdown() {
    buildModelDropdown();
    modelPill.classList.add('open');
    modelDropdown.classList.add('open');
    modelPill.setAttribute('aria-expanded', 'true');
  }

  function closeModelDropdown() {
    modelPill.classList.remove('open');
    modelDropdown.classList.remove('open');
    modelPill.setAttribute('aria-expanded', 'false');
  }

  modelPill.addEventListener('click', function (e) {
    e.stopPropagation();
    modelDropdown.classList.contains('open') ? closeModelDropdown() : openModelDropdown();
  });

  document.addEventListener('click', function (e) {
    if (!document.getElementById('howlModelWrap').contains(e.target)) {
      closeModelDropdown();
    }
  });

  // ─────────────────────────────────────────────────────────────────
  // HISTORY TOGGLE
  // ─────────────────────────────────────────────────────────────────
  historyToggle.addEventListener('click', function () {
    historyOpen = !historyOpen;
    historyToggle.classList.toggle('open', historyOpen);
    if (historyOpen) {
      renderHistory();
      historyList.classList.add('open');
    } else {
      historyList.classList.remove('open');
    }
  });

  // ─────────────────────────────────────────────────────────────────
  // MOBILE SIDEBAR
  // ─────────────────────────────────────────────────────────────────
  function openSidebar() {
    sidebar.classList.add('open');
    overlay.classList.add('visible');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
  }
  sidebarToggle && sidebarToggle.addEventListener('click', function () {
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
  });
  overlay.addEventListener('click', closeSidebar);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      closeSidebar();
      closeModelDropdown();
    }
  });

  // ─────────────────────────────────────────────────────────────────
  // TEXTAREA
  // ─────────────────────────────────────────────────────────────────
  function resizeTextarea() {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
  }
  textarea.addEventListener('input', function () {
    resizeTextarea();
    toggleSendBtn();
  });
  textarea.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isRequesting && textarea.value.trim()) sendMessage();
    }
  });

  function toggleSendBtn() {
    const has = textarea.value.trim().length > 0 && !isRequesting;
    sendBtn.disabled = !has;
    sendBtn.classList.toggle('active', has);
  }

  sendBtn.addEventListener('click', function () {
    if (!isRequesting && textarea.value.trim()) sendMessage();
  });

  // ─────────────────────────────────────────────────────────────────
  // WELCOME CHIPS
  // ─────────────────────────────────────────────────────────────────
  document.querySelectorAll('.howl-welcome-chip').forEach(function (chip) {
    chip.addEventListener('click', function () {
      const prompt = chip.getAttribute('data-prompt');
      if (prompt) {
        textarea.value = prompt;
        resizeTextarea();
        toggleSendBtn();
        textarea.focus();
      }
    });
  });

  // ─────────────────────────────────────────────────────────────────
  // NEW CHAT
  // ─────────────────────────────────────────────────────────────────
  newChatBtn.addEventListener('click', function () {
    startNewConversation();
    closeSidebar();
    textarea.focus();
  });

  function startNewConversation() {
    currentConvoId = null;
    convoMessages  = [];
    resetThread(true);
    if (historyOpen) renderHistory();
    localStorage.removeItem(STORAGE_CURRENT);
  }

  function resetThread(showWelcome) {
    messagesEl.innerHTML = '';
    messagesEl.classList.remove('visible');
    typingEl.classList.remove('visible');
    textarea.value = '';
    resizeTextarea();
    toggleSendBtn();
    threadEl.scrollTop = 0;
    if (showWelcome) welcome.classList.remove('hidden');
  }

  // ─────────────────────────────────────────────────────────────────
  // SEND MESSAGE — real AI call
  // ─────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = textarea.value.trim();
    if (!text || isRequesting) return;

    // First message — hide welcome, show thread
    if (!currentConvoId) {
      welcome.classList.add('hidden');
      messagesEl.classList.add('visible');
    }

    // Add user message to state and DOM
    convoMessages.push({ role: 'user', content: text });
    renderMessage('user', text);

    // Clear input
    textarea.value = '';
    resizeTextarea();
    isRequesting = true;
    toggleSendBtn();

    // Show typing
    typingEl.classList.add('visible');
    scrollToBottom();

    try {
      const content = await callHowlAPI(convoMessages, currentModel);

      typingEl.classList.remove('visible');
      convoMessages.push({ role: 'assistant', content });
      renderMessage('assistant', content);

      // Persist conversation
      if (!currentConvoId) {
        currentConvoId = String(Date.now());
        localStorage.setItem(STORAGE_CURRENT, currentConvoId);
      }
      upsertConversation(
        currentConvoId,
        convoMessages[0].content,   // title = first user message
        currentModel,
        convoMessages
      );
      if (historyOpen) renderHistory();

    } catch (err) {
      typingEl.classList.remove('visible');
      renderError(err.message || 'Errore di connessione. Riprova.');
    }

    isRequesting = false;
    toggleSendBtn();
    scrollToBottom();
    textarea.focus();
  }

  // ─────────────────────────────────────────────────────────────────
  // API CALL
  // ─────────────────────────────────────────────────────────────────
  async function callHowlAPI(messages, model) {
    const response = await fetch('/api/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ model, messages }),
    });

    const data = await response.json().catch(function () {
      throw new Error('Risposta non valida dal server.');
    });

    if (!response.ok) {
      throw new Error(data.error || 'Errore del server (' + response.status + ')');
    }

    if (!data.content) {
      throw new Error('Nessun contenuto ricevuto dal modello.');
    }

    return data.content;
  }

  // ─────────────────────────────────────────────────────────────────
  // RENDER HELPERS
  // ─────────────────────────────────────────────────────────────────
  function renderMessage(role, content) {
    const el = document.createElement('div');
    el.className = 'howl-message';

    if (role === 'user') {
      el.innerHTML =
        '<div class="howl-msg-user">' +
          '<div class="howl-msg-user-bubble">' + escapeHTML(content) + '</div>' +
        '</div>';
    } else {
      el.innerHTML =
        '<div class="howl-msg-assistant">' +
          '<div class="howl-msg-avatar"><img src="../assets/images/logo.png" alt="Howl"/></div>' +
          '<div class="howl-msg-assistant-bubble">' + renderMarkdown(content) + '</div>' +
        '</div>';
    }

    // Insert before typing indicator
    threadEl.insertBefore(el, typingEl);
    scrollToBottom();
  }

  function renderError(msg) {
    const el = document.createElement('div');
    el.className = 'howl-message';
    el.innerHTML =
      '<div class="howl-msg-error">' +
        '<div class="howl-msg-error-bubble">' +
          '<strong style="display:block;margin-bottom:4px">Errore</strong>' +
          escapeHTML(msg) +
        '</div>' +
      '</div>';
    threadEl.insertBefore(el, typingEl);
    scrollToBottom();
  }

  function scrollToBottom() {
    requestAnimationFrame(function () {
      threadEl.scrollTop = threadEl.scrollHeight;
    });
  }

  // ─────────────────────────────────────────────────────────────────
  // MARKDOWN (lightweight renderer for AI responses)
  // ─────────────────────────────────────────────────────────────────
  function renderMarkdown(text) {
    // Fenced code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function (_, lang, code) {
      return '<pre><code>' + escapeHTML(code.trim()) + '</code></pre>';
    });
    // Inline code (after block code to avoid conflicts)
    text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    // Bold
    text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    // Italic
    text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
    // Unordered list items (—, -, *)
    text = text.replace(/^[ \t]*[—\-\*] (.+)$/gm, '<li>$1</li>');
    // Numbered list items
    text = text.replace(/^[ \t]*\d+\. (.+)$/gm, '<li>$1</li>');
    // Wrap consecutive <li> in <ul>
    text = text.replace(/(<li>[\s\S]*?<\/li>)(\n<li>[\s\S]*?<\/li>)*/g, function (m) {
      return '<ul>' + m + '</ul>';
    });
    // Paragraph breaks
    text = text.replace(/\n{2,}/g, '<br><br>');
    // Single newlines
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  // ─────────────────────────────────────────────────────────────────
  // UTILITIES
  // ─────────────────────────────────────────────────────────────────
  function escapeHTML(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000)       return 'adesso';
    if (diff < 3600000)     return Math.floor(diff / 60000) + ' min fa';
    if (diff < 86400000)    return 'oggi';
    if (diff < 172800000)   return 'ieri';
    return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
  }

  // ─────────────────────────────────────────────────────────────────
  // AUTH — read Supabase session
  // ─────────────────────────────────────────────────────────────────
  function tryLoadUser() {
    try {
      for (var k in localStorage) {
        if (k.startsWith('sb-') && k.endsWith('-auth-token')) {
          var data = JSON.parse(localStorage.getItem(k));
          var email = data && data.user && data.user.email;
          if (!email) break;
          document.getElementById('howlUserAvatar').textContent = email.slice(0, 2).toUpperCase();
          document.getElementById('howlUserName').textContent   = email.split('@')[0];
          break;
        }
      }
    } catch (e) {}
  }

  // ─────────────────────────────────────────────────────────────────
  // RESTORE LAST SESSION
  // ─────────────────────────────────────────────────────────────────
  function restoreSession() {
    const savedId = localStorage.getItem(STORAGE_CURRENT);
    if (!savedId) return;
    const convos = loadConversations();
    const c = convos.find(x => x.id === savedId);
    if (!c) return;
    loadConversation(c.id);
  }

  // ─────────────────────────────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────────────────────────────
  updateModelUI();
  tryLoadUser();
  restoreSession();
  textarea.focus();

})();
</script>
