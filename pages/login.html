<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In | aike automation</title>
  <meta name="description" content="Log in to your Aike account." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/styles.css?v=5" />
  <link rel="stylesheet" href="../assets/css/components.css?v=6" />
  <link rel="stylesheet" href="../assets/css/sections.css?v=5" />
  <link rel="stylesheet" href="../assets/css/pages.css?v=5" />

  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl) var(--space-md);
      background: var(--color-bg);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-2xl);
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: var(--space-xl);
      text-decoration: none;
    }

    .auth-logo img {
      width: 28px;
      height: 28px;
    }

    .auth-logo span {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      color: var(--color-white);
      letter-spacing: -0.02em;
    }

    .auth-heading {
      font-family: 'Outfit', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--color-white);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .auth-subheading {
      color: var(--color-text-muted);
      font-size: 0.9rem;
      margin-bottom: var(--space-xl);
    }

    .auth-field {
      margin-bottom: var(--space-md);
    }

    .auth-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--color-text-muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .auth-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-white);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      transition: border-color var(--transition-fast);
      outline: none;
    }

    .auth-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
    }

    .auth-input::placeholder {
      color: rgba(156, 163, 175, 0.4);
    }

    .auth-submit {
      width: 100%;
      padding: 0.8rem;
      background: var(--color-primary);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: var(--space-md);
      transition: opacity var(--transition-fast), transform var(--transition-fast);
    }

    .auth-submit:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .auth-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .auth-error {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      color: #f87171;
      font-size: 0.875rem;
      margin-top: var(--space-md);
    }

    .auth-error.visible { display: block; }

    .auth-footer {
      margin-top: var(--space-lg);
      text-align: center;
      font-size: 0.875rem;
      color: var(--color-text-muted);
    }

    .auth-footer a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">
        <img src="../assets/images/logo.png" alt="Aike" />
        <span>aike</span>
      </a>

      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-subheading">Log in to your Aike account</p>

      <form id="login-form" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="login-email">Email</label>
          <input class="auth-input" type="email" id="login-email" name="email"
            placeholder="you@company.com" autocomplete="email" required />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="login-password">Password</label>
          <input class="auth-input" type="password" id="login-password" name="password"
            placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <button type="submit" class="auth-submit" id="login-submit">Log in</button>

        <div class="auth-error" id="login-error" role="alert"></div>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../assets/js/config.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      var email = document.getElementById('login-email').value.trim();
      var password = document.getElementById('login-password').value;
      var btn = document.getElementById('login-submit');
      var errEl = document.getElementById('login-error');

      errEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Logging in…';

      var sb = window.supabase.createClient(
        window.AIKE_CONFIG.supabase.url,
        window.AIKE_CONFIG.supabase.anonKey
      );

      var result = await sb.auth.signInWithPassword({ email: email, password: password });

      if (result.error) {
        errEl.textContent = result.error.message;
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Log in';
      } else {
        // Check is_admin and redirect accordingly
        var userId = result.data.user.id;
        var profileRes = await sb.from('users').select('is_admin').eq('id', userId).maybeSingle();
        var isAdmin = profileRes.data && profileRes.data.is_admin;
        window.location.href = isAdmin ? 'admin.html' : '../index.html';
      }
    });
  </script>
</body>
</html>
