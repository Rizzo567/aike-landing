<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    /* ── Pricing page specific ── */
    .pricing-hero {
      text-align: left;
      padding: var(--space-4xl) 0 var(--space-md);
      position: relative;
      overflow: hidden;
    }

    .pricing-hero::before {
      content: '';
      position: absolute;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    .pricing-hero__layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2xl);
      align-items: center;
    }

    .pricing-hero__visual {
      position: relative;
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .pricing-hero__visual > img {
      width: 100%;
      max-width: 1000px;
      height: auto;
      position: relative;
      z-index: 2;
      object-fit: contain;
    }

    @media (max-width: 768px) {
      .pricing-hero__layout {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .pricing-hero__visual {
        margin-top: var(--space-xl);
        padding: 10px;
      }
      .pricing-hero p { margin-left: auto; margin-right: auto; }
    }

    /* ── Aurora background ── */
    .aurora-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .aurora-layer {
      --black: #111111;
      --transparent: transparent;
      --blue-500: #3b82f6;
      --indigo-300: #a5b4fc;
      --blue-300: #93c5fd;
      --violet-200: #ddd6fe;
      --blue-400: #60a5fa;

      position: absolute;
      inset: -10px;
      opacity: 0.50;
      will-change: transform;
      filter: blur(10px);

      background-image:
        repeating-linear-gradient(100deg, var(--black) 0%, var(--black) 7%, var(--transparent) 10%, var(--transparent) 12%, var(--black) 16%),
        repeating-linear-gradient(100deg, var(--blue-500) 10%, var(--indigo-300) 15%, var(--blue-300) 20%, var(--violet-200) 25%, var(--blue-400) 30%);
      background-size: 300% 100%, 200% 100%;
      background-position: 50% 50%, 50% 50%;

      mask-image: radial-gradient(ellipse at 100% 0%, black 10%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at 100% 0%, black 10%, transparent 70%);
    }

    .aurora-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(100deg, var(--black) 0%, var(--black) 7%, var(--transparent) 10%, var(--transparent) 12%, var(--black) 16%),
        repeating-linear-gradient(100deg, var(--blue-500) 10%, var(--indigo-300) 15%, var(--blue-300) 20%, var(--violet-200) 25%, var(--blue-400) 30%);
      background-size: 200% 100%, 100% 100%;
      background-attachment: fixed;
      mix-blend-mode: difference;
      animation: aurora 60s linear infinite;
    }

    @keyframes aurora {
      from { background-position: 50% 50%, 50% 50%; }
      to   { background-position: 350% 50%, 350% 50%; }
    }

    .pricing-hero h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: var(--space-md);
    }

    .pricing-hero p {
      font-size: 1.1rem;
      max-width: 540px;
      margin: 0 0 var(--space-xl);
      color: var(--color-text-muted);
    }

    /* ── Container Scroll Animation ── */
    .container-scroll {
      height: 80rem;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 2rem 1.25rem;
      margin-top: -210px;
    }

    @media (max-width: 768px) {
      .container-scroll { height: 60rem; padding: 2rem 0.5rem; margin-top: -100px; }
    }

    .container-scroll__inner {
      padding: 0 0 10rem;
      width: 100%;
      position: relative;
      perspective: 1000px;
    }

    @media (min-width: 769px) {
      .container-scroll__inner { padding: 1rem 0; }
    }

    .container-scroll__header {
      max-width: 64rem;
      margin: 0 auto;
      text-align: center;
      will-change: transform;
    }

    .container-scroll__header h2 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2rem, 4.5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--color-text);
      margin-bottom: 0;
    }

    .container-scroll__card {
      max-width: 64rem;
      margin: -3rem auto 0;
      width: 100%;
      border: 4px solid #6C6C6C;
      padding: 0.5rem;
      background: #222222;
      border-radius: 30px;
      will-change: transform;
      box-shadow:
        0 0 #0000004d,
        0 9px 20px #0000004a,
        0 37px 37px #00000042,
        0 84px 50px #00000026,
        0 149px 60px #0000000a,
        0 233px 65px #00000003;
    }

    @media (min-width: 769px) {
      .container-scroll__card { padding: 1.5rem; }
    }

    .container-scroll__card-inner {
      height: 30rem;
      width: 100%;
      overflow: hidden;
      border-radius: 1rem;
      background: var(--color-surface);
    }

    @media (min-width: 769px) {
      .container-scroll__card-inner { height: 40rem; border-radius: 1rem; padding: 1rem; }
    }

    .container-scroll__card-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main class="main-content">

      <!-- Hero -->
      <section class="pricing-hero">
        <div class="aurora-wrap"><div class="aurora-layer"></div></div>
        <div class="container pricing-hero__layout">
          <div class="pricing-hero__content" data-reveal>
            <h1 style="transition-delay:0.08s;">
              Websites that work<br>for your <span class="text-purple">business</span>

            <p style="transition-delay:0.16s;">
              We design and build premium websites — fast delivery, conversion-focused, and built to grow with you.
            </p>
            <a href="booking.html" class="btn btn-primary" style="transition-delay:0.24s; display:inline-flex;">
              Book a free call
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </a>
          </div>
          <div class="pricing-hero__visual" aria-hidden="true" data-reveal style="transition-delay: 0.2s;">
            <img src="../assets/images/logo5.png" alt="Owl mascot" />

            <div class="float-icon float-icon--1">
              <img class="float-icon__img" src="../assets/images/logos/Claude_AI_symbol.svg" alt="Claude Code"
                onerror="this.outerHTML='<span class=&quot;fallback-icon&quot;>🤖</span>'">

            </div>

            <div class="float-icon float-icon--2">
              <img class="float-icon__img" src="../assets/images/logos/Notion-logo.svg.png" alt="Notion"
                onerror="this.outerHTML='<span class=&quot;fallback-icon&quot;>N</span>'">
              <div class="float-tooltip">Notion</div>
            </div>

            <div class="float-icon float-icon--3">
              <img class="float-icon__img" src="../assets/images/logos/nanobananapro.png" alt="Nano Banana Pro"
                onerror="this.outerHTML='<span class=&quot;fallback-icon&quot;>🍌</span>'">
              <div class="float-tooltip">Nano Banana Pro</div>
            </div>

            <div class="float-icon float-icon--4">
              <img class="float-icon__img" src="../assets/images/logos/Google_Antigravity_icon.webp" alt="Antigravity"
                onerror="this.outerHTML='<span class=&quot;fallback-icon&quot;>🌌</span>'">
              <div class="float-tooltip">Antigravity</div>
            </div>

            <div class="float-icon float-icon--5">
              <img class="float-icon__img" src="../assets/images/logos/Cursor_Vector_Logo.png" alt="Cursor"
                onerror="this.outerHTML='<span class=&quot;fallback-icon&quot;>➤</span>'">

      <!-- Container Scroll Animation -->
      <section class="container-scroll" id="containerScroll">
        <div class="container-scroll__inner">
          <div class="container-scroll__header" id="scrollHeader">
            <h2>Your next website <span class="text-purple">looks like this</span></h2>
          </div>
          <div class="container-scroll__card" id="scrollCard">
            <div class="container-scroll__card-inner">
              <iframe src="https://dca02baa.sam-website-bkp.pages.dev/" title="Website preview" style="width:100%;height:100%;border:none;border-radius:inherit;"></iframe>
            </div>
          </div>
        </div>
      </section>

    </main>
    <div id="footer-placeholder"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/analytics.js"></script>
  <script src="../assets/js/bundle.js"></script>

  <script>
  (function () {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) { e.target.classList.add('revealed'); io.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('[data-reveal]').forEach(function (el) { io.observe(el); });
  })();

  /* ── Container Scroll Animation ── */
  (function () {
    var container = document.getElementById('containerScroll');
    var header = document.getElementById('scrollHeader');
    var card = document.getElementById('scrollCard');
    if (!container || !header || !card) return;

    function isMobile() { return window.innerWidth <= 768; }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function update() {
      var rect = container.getBoundingClientRect();
      var h = container.offsetHeight;
      // progress 0 → 1 as section scrolls through viewport
      var raw = -rect.top / (h - window.innerHeight);
      var progress = Math.min(Math.max(raw, 0), 1);

      // Rotate: 20deg → 0deg
      var rotate = lerp(20, 0, progress);
      // Scale: mobile 0.7→0.9, desktop 1.05→1
      var scaleRange = isMobile() ? [0.7, 0.9] : [1.05, 1];
      var scale = lerp(scaleRange[0], scaleRange[1], progress);
      // Translate header: 0 → -100px
      var translate = lerp(0, -100, progress);

      header.style.transform = 'translateY(' + translate + 'px)';
      card.style.transform = 'rotateX(' + rotate + 'deg) scale(' + scale + ')';
    }

    var ticking = false;
    window.addEventListener('scroll', function () {
      if (!ticking) {
        requestAnimationFrame(function () { update(); ticking = false; });
        ticking = true;
      }
    }, { passive: true });
    update();
  })();
  </script>
</body>
